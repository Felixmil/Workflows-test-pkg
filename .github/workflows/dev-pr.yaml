---
# Manual "restore development mode" button.
name: dev-pr.yaml

on:
  workflow_dispatch:

permissions: write-all

jobs:
  dev-pr:
    uses: Felixmil/Workflows/.github/workflows/dev-pr.yaml@test-helper-checkout-default
    with:
      # App token so the opened PR triggers pr.yaml CI (a PR opened with the
      # default GITHUB_TOKEN does NOT trigger other workflows).
      app-id: ${{ vars.OSP_BOT_APP_ID }}
    secrets:
      private-key: ${{ secrets.OSP_BOT_PRIVATE_KEY }}
