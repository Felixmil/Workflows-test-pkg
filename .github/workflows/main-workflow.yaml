---
# Caller workflow exercising the split reusable workflows from
# Felixmil/Workflows@rework-description-tagging.
#
#   pull_request -> sync-remotes (Remotes follow the version, commit to PR)
#                   R-CMD-check (runs AFTER sync, so it checks the merge-able tree)
#   push to main -> R-CMD-check, then by version kind:
#                     release x.y.z      -> publish-release (tag + GitHub Release + binaries)
#                     dev     x.y.z.NNNN -> bump-dev-version (bump .NNNN, commit)
#
# Releasing and restoring dev are separate manual workflows: release-pr.yaml and
# dev-pr.yaml (each runs usethis + opens a PR validated by this pipeline).
#
# main is unprotected in this test repo, so bump-dev-version and the tag push use
# the default GITHUB_TOKEN (no GitHub App token wired).
name: main-workflow

on:
  pull_request:
  push:
    branches: [main]

# The repo default token is read-only and R-CMD-check-build uses `read-all`,
# while bump/publish/sync need `contents: write`. A caller `permissions:` block
# is a CEILING for called workflows, so grant a superset here.
permissions: write-all

jobs:
  sync-remotes:
    if: github.event_name == 'pull_request'
    uses: Felixmil/Workflows/.github/workflows/sync_remotes.yaml@rework-description-tagging

  bump-dev-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: Felixmil/Workflows/.github/workflows/bump_dev_version.yaml@rework-description-tagging

  # Runs after sync-remotes so it checks out the synced DESCRIPTION (the R
  # environment must match the Remotes state sync-remotes produced). On push /
  # dispatch, sync-remotes is skipped; a skipped need plus `if: !cancelled()`
  # does not block this job, so it still runs.
  R-CMD-check:
    needs: [sync-remotes]
    if: ${{ !cancelled() }}
    uses: Felixmil/Workflows/.github/workflows/R-CMD-check-build.yaml@rework-description-tagging
    with:
      # Ubuntu-only matrix to keep test runs fast.
      os-matrix: '[{"os": "ubuntu-latest", "r": "release"}]'

  # Release only when R-CMD-check SUCCEEDED on every matrix OS. The matrix is
  # aggregated by needs:, so result == 'success' means all legs passed. The
  # `!cancelled()` opts out of GitHub's implicit "skip if any need was skipped"
  # (R-CMD-check transitively needs the skipped sync-remotes); the explicit
  # result check still blocks a FAILED check.
  # A release PR hitting main = push to main with a release Version (x.y.z).
  # publish_release detects the version kind and no-ops on a dev version, so this
  # only acts on a real release commit. Gated on R-CMD-check success.
  publish-release:
    needs: [R-CMD-check]
    if: ${{ !cancelled() && needs.R-CMD-check.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: Felixmil/Workflows/.github/workflows/publish_release.yaml@rework-description-tagging
