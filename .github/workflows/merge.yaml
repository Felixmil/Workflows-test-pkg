---
# Merge pipeline: what happens when something lands on the default branch.
#
#   R-CMD-check      -> build + check the merged tree
#   bump-dev-version -> on a dev version, bump .NNNN and commit; release no-op
#
# Releasing (tag + GitHub Release) is NOT automatic on merge: it is a deliberate
# manual dispatch, see publish.yaml.
name: merge.yaml

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  R-CMD-check:
    uses: Felixmil/Workflows/.github/workflows/R-CMD-check-build.yaml@main
    with:
      # Ubuntu-only matrix to keep test runs fast.
      os-matrix: '[{"os": "ubuntu-latest", "r": "release"}]'

  # Dev version on main -> bump the .NNNN suffix. bump-dev-version no-ops on a
  # release version.
  bump-dev-version:
    uses: Felixmil/Workflows/.github/workflows/bump-dev-version.yaml@main
