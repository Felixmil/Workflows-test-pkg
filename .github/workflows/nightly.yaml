---
# Nightly check against the latest *released* OSP dependencies. Runs for whatever
# Version main currently carries (dev or release): pins Remotes to @*release
# ephemerally, then R CMD check.
name: nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# R-CMD-check-released-deps uses `read-all`; the repo default token is read-only,
# so grant the read superset as the caller ceiling.
permissions: read-all

jobs:
  R-CMD-check-released-deps:
    uses: Felixmil/Workflows/.github/workflows/R-CMD-check-released-deps.yaml@rework-description-tagging
    with:
      # Ubuntu-only matrix to keep test runs fast.
      os-matrix: '[{"os": "ubuntu-latest", "r": "release"}]'
