---
# Pull-request pipeline: keep Remotes in sync with the version, then check the
# tree we would actually merge.
#
#   sync-remotes -> commit Remotes (pinned for a release version, bare for a dev
#                   version) back onto the PR branch
#   R-CMD-check  -> runs AFTER sync-remotes, so the R environment matches the
#                   synced DESCRIPTION
name: pr.yaml

on:
  pull_request:

# R-CMD-check-build uses `read-all` and sync-remotes needs `contents: write`;
# a caller permissions block is a ceiling for called workflows, so grant a
# superset (the repo default token is read-only).
permissions: write-all

jobs:
  sync-remotes:
    uses: Felixmil/Workflows/.github/workflows/sync-remotes.yaml@test-helper-checkout-default

  # needs: sync-remotes so the checkout includes the synced DESCRIPTION. On a
  # fork PR sync-remotes skips its push; a skipped need plus `!cancelled()` does
  # not block this job.
  R-CMD-check:
    needs: [sync-remotes]
    if: ${{ !cancelled() }}
    uses: Felixmil/Workflows/.github/workflows/R-CMD-check-build.yaml@test-helper-checkout-default
    with:
      # Ubuntu-only matrix to keep test runs fast.
      os-matrix: '[{"os": "ubuntu-latest", "r": "release"}]'
