---
# Manual "publish the release" button. Dispatch this after a release PR has been
# merged to the default branch (DESCRIPTION at a release Version x.y.z).
#
#   R-CMD-check     -> build the merged tree, upload per-OS binaries
#   publish-release -> tag vX.Y.Z at main HEAD + GitHub Release (NEWS notes +
#                      the binaries from this run). No-op if Version is a dev one.
name: publish.yaml

on:
  workflow_dispatch:

permissions: write-all

jobs:
  R-CMD-check:
    uses: Felixmil/Workflows/.github/workflows/R-CMD-check-build.yaml@rework-description-tagging
    with:
      os-matrix: '[{"os": "ubuntu-latest", "r": "release"}]'

  publish-release:
    needs: [R-CMD-check]
    if: ${{ needs.R-CMD-check.result == 'success' }}
    uses: Felixmil/Workflows/.github/workflows/publish-release.yaml@rework-description-tagging
