---
# Manual "publish the release" button: open a release PR, bumping the version by
# the chosen component (usethis::use_version).
name: release-pr

on:
  workflow_dispatch:
    inputs:
      which:
        description: 'Which component to bump: major, minor, or patch'
        type: choice
        required: true
        default: patch
        options:
          - major
          - minor
          - patch

permissions: write-all

jobs:
  release-pr:
    uses: Felixmil/Workflows/.github/workflows/release_pr.yaml@rework-description-tagging
    with:
      which: ${{ inputs.which }}
