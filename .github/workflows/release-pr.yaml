---
# Manual "publish the release" button: open a release PR for a given version.
name: release-pr

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (x.y.z, no dev component), e.g. 0.2.2'
        type: string
        required: true

permissions: write-all

jobs:
  release-pr:
    uses: Felixmil/Workflows/.github/workflows/release_pr.yaml@rework-description-tagging
    with:
      version: ${{ inputs.version }}
