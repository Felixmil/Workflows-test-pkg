---
# Manual "publish the release" button: open a release PR, bumping the version by
# the chosen component (usethis::use_version).
name: release-pr.yaml

on:
  workflow_dispatch:
    inputs:
      which:
        description: 'Which component to bump: major, minor, or patch'
        type: choice
        required: true
        default: patch
        options:
          - major
          - minor
          - patch

permissions: write-all

jobs:
  release-pr:
    uses: Felixmil/Workflows/.github/workflows/release-pr.yaml@main
    with:
      which: ${{ inputs.which }}
      # App token so the opened PR triggers pr.yaml CI (a PR opened with the
      # default GITHUB_TOKEN does NOT trigger other workflows).
      app-id: ${{ vars.OSP_BOT_APP_ID }}
    secrets:
      private-key: ${{ secrets.OSP_BOT_PRIVATE_KEY }}
